name: Profil Vert Auto

on:
  schedule:
    - cron: '0 12 * * *'

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Modification invisible
        run: echo "Update $(date)" >> activite.txt
        
      - name: Commit discret
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_user_name: 'wassimben2'     
          commit_user_email: 'wassimbennamane6@gmail.com' 
          commit_author: 'wassimben2 <wassimbennamane6@gmail.com>'
          commit_message: 'update profile stats' 
